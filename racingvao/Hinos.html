<!--Cando Leri creou o mundo quedou tan escarallao que deitouse nunha  praia e alí ficou sobao. Sito Adán e maila Eva o seu tanguiña lle roubaron  e pra cando espertou xa estaba mal aparcao.     CHORUS: Leri Ví, Leri Ví, Leri Ví, oh- Leri Ví es mellor que o Papa  Leri Ví   Montado na furjoneta foi detrás dos pecadores  ó atopalos obrigoulles á facerse porteadores.   Cun altofalante daba moitas órdenes a gritos  forzándolles a botar area ó son dun pito.     CHORUS: Leri Ví...     Coa pala e un rastriño fixeron campos e regatos:   desta maneira quedaron  creados os Campeonatos.   Botou fóra a Adán e a Eva dándolles con unha pota:   foron vanos os esforzos por facerlle a pelota.     Co tempo viñeron bárbaros que o seu fúbol impuxeron   e foron botando fóra ós que xogaban sen porteiro.   Estes vándalos felices ás tormentas aplacaban:   cando xogaban eles sempre arriba o sol brilaba.     O seu xogo era ofensivo, vertical, rápido e direto:   cando chegaban á porta non quedaba un pao ereto.     Loitadores e xeniales, goleadores e coquetos,   cando tocaban as doce todo dios paraba quieto.     A nobleza e o bó gusto non sempre se dan a man   e se de aquela sobraba  este andaba moi escaso.   Elegantes e corretos non lles gustaban as tretas   tiñan nostante unha peja: as horribles camisetas.     Cando o Rácing xoga na casa faise festa e un cocido   e logo márchanse todos contentiños ó partido.   Se se gaña moi ufanos e alegres vanse pra ducha;   se se perde ¡que mais da!  ¡a come-la cadelucha! LERI VÍ ( DEIXAO FACER) Letra: OjOVo Música: JOHNNY FLY HINO OFICIAL -->
